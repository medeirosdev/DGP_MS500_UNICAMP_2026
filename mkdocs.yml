site_name: DGP Wiki — MS500 UNICAMP 2026
site_description: Wiki da disciplina MS500 - Distance Geometry Problem com aplicações
site_url: ""

theme:
  name: material
  language: pt-BR
  palette:
    - scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Modo escuro
    - scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Modo claro
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

nav:
  - Introdução:
    - Início: index.md
    - Fundamentos: introducao/fundamentos.md
    - Modelagem: introducao/modelagem.md
    - Algoritmos: introducao/algoritmos.md
  - Revisão Grafos:
    - Definições Básicas: revisao-grafos/definicoes.md
    - Passeios, Caminhos e Ciclos: revisao-grafos/caminhos.md
    - Teoria Espectral: revisao-grafos/espectral.md
    - Grafos Especiais: revisao-grafos/especiais.md
  - Revisão Biologia:
    - Visão Geral: revisao-biologia/index.md
  - Aplicações:
    - Visão Geral: aplicacoes/index.md
  - Artigo:
    - Visão Geral: artigo/index.md
  - Exercícios:
    - Visão Geral: exercicios/index.md
  - Professores:
    - Carlile Campos Lavor: professores/carlile.md
    - Michael Souza: professores/michael.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
