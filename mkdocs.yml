site_name: DGP Wiki — MS500 UNICAMP 2026
site_description: Wiki da disciplina MS500 - Distance Geometry Problem com aplicações
site_url: ""

theme:
  name: material
  language: pt-BR
  palette:
    - scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Modo escuro
    - scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Modo claro
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

nav:
  - Início: index.md
  - Fundamentos:
    - Visão Geral: fundamentos/index.md
  - Modelagem:
    - Visão Geral: modelagem/index.md
  - Algoritmos:
    - Visão Geral: algoritmos/index.md
  - Aplicações:
    - Visão Geral: aplicacoes/index.md
  - Computacional:
    - Visão Geral: computacional/index.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
